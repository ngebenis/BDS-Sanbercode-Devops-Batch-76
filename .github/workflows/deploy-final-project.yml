name: Deploy VPS Monitor

on:
  push:
    branches: [ main ] # Menjalankan action saat ada push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Pindah ke direktori target
            cd /var/www/html/vps-monitor || mkdir -p /var/www/html/vps-monitor && cd /var/www/html/vps-monitor
            
            # Tarik kode terbaru (Pastikan folder sudah di-init git atau gunakan rsync)
            # Jika folder baru, gunakan git clone. Jika sudah ada, gunakan git pull.
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git .
            fi

            # Install dependensi
            npm install --production

            # Restart aplikasi dengan PM2 agar tetap hemat RAM (<200MB)
            pm2 delete vps-monitor || true
            pm2 start server.js --name "vps-monitor" --max-memory-restart 150M