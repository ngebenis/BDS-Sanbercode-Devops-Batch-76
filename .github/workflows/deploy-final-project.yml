name: Deploy VPS Monitor

on:
  push:
    branches: [ main ] # Menjalankan action saat ada push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Masuk dan pastikan izin folder benar
            sudo mkdir -p /var/www/html/vps-monitor
            sudo chown -R $USER:$USER /var/www/html/vps-monitor
            cd /var/www/html/vps-monitor

            # 2. Update kode dari GitHub
            if [ ! -d ".git" ]; then
              git clone https://github.com/ngebenis/BDS-Sanbercode-Devops-Batch-76.git .
            else
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            fi

            # 3. Pindah ke sub-folder Final-Project (Sesuai struktur folder Anda)
            cd Final-Project

            # 4. Install & Jalankan
            npm install --omit=dev
            
            # Restart dengan PM2
            # Kita arahkan PM2 untuk menjalankan server.js yang ada di folder ini
            pm2 delete vps-monitor || true
            pm2 start server.js --name "vps-monitor" --max-memory-restart 150M