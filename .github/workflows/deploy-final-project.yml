name: Deploy VPS Monitor

on:
  push:
    branches: [ main ] # Menjalankan action saat ada push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            TARGET_DIR="/var/www/html/vps-monitor"
            TEMP_DIR="/tmp/final_project_build"

            # 1. Bersihkan sisa-sisa kegagalan sebelumnya
            sudo rm -rf $TEMP_DIR
            mkdir -p $TEMP_DIR
            
            # 2. Clone repository ke folder temporary
            git clone --depth 1 https://github.com/ngebenis/BDS-Sanbercode-Devops-Batch-76.git $TEMP_DIR
            
            # 3. Masuk ke folder target
            sudo mkdir -p $TARGET_DIR
            sudo chown -R $USER:$USER $TARGET_DIR
            cd $TARGET_DIR

            # 4. PINDAHKAN FILE (Gunakan rsync agar lebih stabil daripada cp)
            # Kita pindahkan semua file dari subfolder Final-Project ke root vps-monitor
            rsync -av $TEMP_DIR/Final-Project/ .
            
            # 5. Verifikasi: Pastikan package.json ada sebelum lanjut
            if [ ! -f "package.json" ]; then
              echo "CRITICAL ERROR: package.json tidak ditemukan setelah copy!"
              ls -la
              exit 1
            fi

            # 6. Install & Run
            npm install --omit=dev
            pm2 delete vps-monitor || true
            pm2 start server.js --name "vps-monitor" --max-memory-restart 150M

            # 7. Cleanup
            rm -rf $TEMP_DIR